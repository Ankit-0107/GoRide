<!DOCTYPE html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Happiness Campaign App" />
    <title>Happiness Campaign</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-fixed-dim": "#fe5d39",
                        "tertiary": "#e6a7ff",
                        "primary-dim": "#ff7353",
                        "on-primary-fixed-variant": "#5b0d00",
                        "on-secondary-fixed-variant": "#922c35",
                        "surface-dim": "#0e0e0e",
                        "on-error-container": "#ffb2b9",
                        "secondary-container": "#84222c",
                        "on-secondary-container": "#ffc1c1",
                        "on-secondary": "#49000c",
                        "primary-container": "#ff7859",
                        "error-container": "#a70138",
                        "tertiary-fixed-dim": "#ce88ec",
                        "on-primary": "#5f0e00",
                        "tertiary-fixed": "#dc95fb",
                        "on-surface-variant": "#adaaaa",
                        "tertiary-dim": "#ce88ec",
                        "on-surface": "#ffffff",
                        "surface-tint": "#ff8f75",
                        "inverse-surface": "#fcf9f8",
                        "on-tertiary-container": "#50086f",
                        "surface-container-high": "#201f1f",
                        "outline": "#767575",
                        "primary": "#ff8f75",
                        "surface": "#0e0e0e",
                        "inverse-on-surface": "#565555",
                        "on-tertiary": "#5b1979",
                        "on-error": "#490013",
                        "surface-variant": "#262626",
                        "secondary-dim": "#f5777c",
                        "primary-fixed": "#ff7859",
                        "on-tertiary-fixed-variant": "#5a1778",
                        "outline-variant": "#484847",
                        "error": "#ff6e84",
                        "on-tertiary-fixed": "#2c0040",
                        "on-background": "#ffffff",
                        "on-primary-fixed": "#000000",
                        "secondary-fixed-dim": "#ffafaf",
                        "surface-container-highest": "#262626",
                        "surface-container-low": "#131313",
                        "secondary": "#f5777c",
                        "error-dim": "#d73357",
                        "surface-container-lowest": "#000000",
                        "surface-container": "#1a1919",
                        "on-secondary-fixed": "#6a0d1b",
                        "inverse-primary": "#b52907",
                        "on-primary-container": "#4a0900",
                        "secondary-fixed": "#ffc3c3",
                        "background": "#0e0e0e",
                        "tertiary-container": "#dc95fb",
                        "surface-bright": "#2c2c2c"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"],
                        "display": ["Space Grotesk"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                    backgroundImage: {
                        "gradient-radial": "radial-gradient(var(--tw-gradient-stops))",
                        "mesh-gradient": "radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(225,39%,30%,0.1) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(339,49%,30%,0.1) 0, transparent 50%)",
                    },
                    animation: {
                        "glow-pulse": "glow-pulse 3s ease-in-out infinite",
                        "float": "float 6s ease-in-out infinite",
                        "shimmer": "shimmer 2s linear infinite",
                        "stagger-in": "stagger-in 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards",
                        "gradient-shift": "gradient-shift 5s ease infinite",
                    },
                    keyframes: {
                        "glow-pulse": {
                            "0%, 100%": { opacity: "0.5", transform: "scale(1)" },
                            "50%": { opacity: "1", transform: "scale(1.05)" },
                        },
                        "float": {
                            "0%, 100%": { transform: "translateY(0)" },
                            "50%": { transform: "translateY(-10px)" },
                        },
                        "shimmer": {
                            "0%": { transform: "translateX(-100%)" },
                            "100%": { transform: "translateX(100%)" },
                        },
                        "stagger-in": {
                            "0%": { opacity: "0", transform: "translateY(20px)" },
                            "100%": { opacity: "1", transform: "translateY(0)" },
                        },
                        "gradient-shift": {
                            "0%, 100%": { backgroundPosition: "0% 50%" },
                            "50%": { backgroundPosition: "100% 50%" },
                        }
                    },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
        }
        html, body, #root {
            background-color: #0e0e0e;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            width: 100%;
            min-width: 100%;
        }
        /* Global scrollbar styling to prevent light tracks from showing */
        ::-webkit-scrollbar {
            width: 0px; /* Try to collapse it entirely */
            background: #0e0e0e;
        }
        ::-webkit-scrollbar-track {
            background: #0e0e0e; /* Match app background exactly */
        }
        ::-webkit-scrollbar-thumb {
            background: #262626; /* Dark subtle thumb */
            border-radius: 4px;
        }
        html, body {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* Keep utility class for specific elements if needed */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* New Vibrant UI Utilities */
        .glass-card {
            background: rgba(26, 25, 25, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 143, 117, 0.1);
        }
        .glow-border {
            position: relative;
        }
        .glow-border::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(45deg, #ff8f75, #e6a7ff, #ff8f75);
            background-size: 200% auto;
            animation: gradient-shift 3s linear infinite;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        .gradient-text {
            background: linear-gradient(to right, #ff8f75, #e6a7ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .bg-gradient-brand {
            background: linear-gradient(135deg, #ff8f75 0%, #ff7859 50%, #e6a7ff 100%);
            background-size: 200% 200%;
        }
        .glow-shadow {
            box-shadow: 0 0 20px rgba(255, 143, 117, 0.3);
        }
        .hover-glow-shadow:hover {
            box-shadow: 0 0 25px rgba(255, 143, 117, 0.5);
        }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
